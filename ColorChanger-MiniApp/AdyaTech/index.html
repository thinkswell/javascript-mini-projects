<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="random-element">
        <h1>Color Changer</h1>
        <!-- Users can choose from a pre-defined palette of colors. -->
        <h2>CLICK ANY ONE OF THESE ELEMENTS</h2>
        <div class="color-pallets-div">
            <div class="pallet" data-color="red"></div>
            <div class="pallet" data-color="green"></div>
            <div class="pallet" data-color="purple"></div>
            <div class="pallet" data-color="blue"></div>
        </div>
        <!-- Users can input their own custom color codes (hex, rgb, etc.). -->
        <div class="custom-color">
            <h2>ENTER A COLOR CODE OF YOUR CHOICE</h2>
            <div class="custom-color">
                <input type="text" id="customColor" placeholder="e.g. #ff5733/rgb(255,87,51)/pink">
                <button onclick="applyCustomColor()">Apply</button>
                <p id="error"></p>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Users can change RGB levels. -->
        <div class="wrapper">
            R<input type="range" min="0" max="255" value="0" id="red" oninput="colors()">
        </div>
        <div class="wrapper">
            G<input type="range" min="0" max="255" value="0" id="green" oninput="colors()">
        </div>
        <div class="wrapper">
            B<input type="range" min="0" max="255" value="0" id="blue" oninput="colors()">
        </div>
        <span id="output">rgb(0, 0, 0)</span>

        <!-- Users can download or share their customized color schemes. -->
        <div class="actions">
            <button onclick="downloadColor()">Download</button>
            <button onclick="shareColor()">Share</button>
        </div>


    </div>
    </div>



    <script src="script.js"></script>

</body>

</html>
